<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Round Robin Scheduler</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="settingsTitle">Round Robin Schedule Generator</h1>
      <div class="versionTag">version 1.0.1</div>
      <div class="card settingsCard">
        <h2>Settings</h2>
        <form id="settingsForm">
          <div class="formRow">
            <label class="stackedInput">
              Number of teams
              <input type="number" name="teams" min="2" step="1" value="" />
            </label>
            <label class="stackedInput">
              Matches per team
              <input type="number" name="gamesPerTeam" min="1" step="1" value="" />
            </label>
          </div>

          <label class="stackedInput fullWidthInput">
            Number of courts
            <input type="number" name="courts" min="1" step="1" value="" />
          </label>

          <label class="toggleRow">
            <span>Segment courts</span>
            <input type="checkbox" name="segmentCourts" class="toggleInput" />
            <span class="toggleTrack" aria-hidden="true"><span class="toggleThumb"></span></span>
          </label>

          <div id="segmentCourtsBlock" class="segmentCourtsBlock" hidden>
            <label class="stackedInput fullWidthInput">
              Number of segments
              <input
                type="number"
                id="segmentCount"
                name="segmentCount"
                min="2"
                step="1"
                value="2"
              />
            </label>
            <p id="segmentCourtsHint" class="muted segmentCourtsHint">
              Courts are grouped left-to-right (e.g. segment 1 = lowest court numbers). Sizes must add up to the
              number of courts above; the last segment fills the remainder.
            </p>
            <div id="segmentSizesFields" class="segmentSizesFields"></div>
            <div id="segmentLastRow" class="segmentLastRow muted"></div>
            <input type="hidden" name="courtSegmentSizes" id="courtSegmentSizes" value="[]" />
          </div>

          <label class="toggleRow">
            <span>Peer reffing</span>
            <input type="checkbox" name="includeRef" class="toggleInput" />
            <span class="toggleTrack" aria-hidden="true"><span class="toggleThumb"></span></span>
          </label>

          <label class="refField">
            <span id="refFieldLabelWrap">Teams ref <span id="refFieldX">1</span> court per round</span>
            <select name="refSlotsPreset" id="refSlotsPreset">
              <option value="1" selected>1</option>
              <option value="2">2</option>
              <option value="all">All</option>
            </select>
          </label>

          <input type="hidden" name="refSlotsPerRound" value="3" />
          <input type="hidden" name="refLabelMode" value="paired" />

          <label class="toggleRow">
            <span>Ensure each team has at least one Bye</span>
            <input type="checkbox" name="ensureEachTeamHasBye" class="toggleInput" />
            <span class="toggleTrack" aria-hidden="true"><span class="toggleThumb"></span></span>
          </label>

          <label class="toggleRow">
            <span>Include Halfway Intermission</span>
            <input type="checkbox" name="includeHalfwayIntermission" class="toggleInput" />
            <span class="toggleTrack" aria-hidden="true"><span class="toggleThumb"></span></span>
          </label>

          <label class="toggleRow">
            <span>Evenly distribute Home/Away games</span>
            <input type="checkbox" name="distributeHomeAway" class="toggleInput" />
            <span class="toggleTrack" aria-hidden="true"><span class="toggleThumb"></span></span>
          </label>

          <label class="toggleRow">
            <span>Include round times</span>
            <input type="checkbox" name="includeRoundTime" id="includeRoundTime" class="toggleInput" />
            <span class="toggleTrack" aria-hidden="true"><span class="toggleThumb"></span></span>
          </label>

          <div id="roundTimesBlock" class="formRow compactRow">
            <label id="startTimeRow" class="stackedInput">
              Start time
              <input type="time" name="startTime" value="09:00" />
            </label>
            <label id="roundLengthRow" class="stackedInput">
              Round length (minutes)
              <input type="number" name="roundLengthMinutes" min="1" step="1" value="8" />
            </label>
          </div>

          <div class="generateBlock">
            <button type="button" id="generateBtn" class="generatePrimary">Generate</button>
            <div id="generateLoading" class="generateLoading" hidden role="status" aria-live="polite">
              <span class="spinner" aria-hidden="true"></span>
              <span class="generateLoadingText">Generating schedule…</span>
            </div>
            <div class="secondaryActionsRow">
              <button id="reworkBtn" type="button" disabled>Rework</button>
              <button id="resetBtn" type="button" disabled>Clear</button>
              <button id="downloadBtnTop" type="button" disabled>Download CSV</button>
            </div>
          </div>
        </form>
        <div id="error" class="error" aria-live="polite"></div>
      </div>

      <div class="card reportCard hiddenCard" id="reportCard">
        <h2>Overview</h2>
        <div id="summary"></div>
      </div>

      <div class="card hiddenCard" id="scheduleCard">
        <h2>Schedule</h2>
        <div id="rounds"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
